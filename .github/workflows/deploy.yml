name: Build & deploy to GitHub Pages

on:
  # Auto-deploy on every push to main.
  push:
    branches: [main]
  # Also allow manual triggers from the Actions tab.
  workflow_dispatch:

# Limit GITHUB_TOKEN to what Pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight deploys when a new commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Vite needs `/repo-name/` as the base path so asset URLs resolve
          # correctly on github.io. We pull the repo name from the workflow
          # context so this works no matter what you call the repo.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
